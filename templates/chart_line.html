<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --color-primary:#2DD4BF; --color-bg:#0B1628; --color-text:#EAF2FF; --color-grid:#243B61; }
    html, body { margin:0; height:100%; background:var(--color-bg); color:var(--color-text); font-family:Segoe UI, Arial, sans-serif; }
    .chart-shell { height:100vh; padding:12px; box-sizing:border-box; background:linear-gradient(135deg,#0B1628,#132238); }
    canvas { width:100% !important; height:100% !important; }
  </style>
</head>
<body>
  <div class="chart-shell"><canvas id="chart"></canvas></div>
  <script>
    const data = {{DATA_PLACEHOLDER}};
    new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: data.labels,
        datasets: [{
          label: data.title,
          data: data.values,
          borderColor: "#2DD4BF",
          pointBackgroundColor: "#FFD166",
          pointBorderColor: "#0B1628",
          pointRadius: 4,
          backgroundColor: "rgba(45,212,191,.16)",
          borderWidth: 3,
          tension: .32,
          fill: true
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#AFC1D8" }, grid: { color: "#243B61" } }, y: { ticks: { color: "#AFC1D8" }, grid: { color: "#243B61" } } } }
    });
  </script>
</body>
</html>
