<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html, body { margin:0; height:100%; background:#0B1628; color:#EAF2FF; font-family:Segoe UI, Arial, sans-serif; }
    .chart-shell { height:100vh; padding:12px; box-sizing:border-box; background:linear-gradient(135deg,#0B1628,#132238); }
    canvas { width:100% !important; height:100% !important; }
  </style>
</head>
<body>
  <div class="chart-shell"><canvas id="chart"></canvas></div>
  <script>
    const data = {{DATA_PLACEHOLDER}};
    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: data.labels,
        datasets: data.datasets.map((dataset, index) => ({
          label: dataset.label,
          data: dataset.values,
          backgroundColor: index === 0 ? "#EF476F" : "#FFD166",
          borderRadius: 5
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#EAF2FF" } } },
        scales: { x: { stacked: false, ticks: { color: "#AFC1D8" }, grid: { color: "#243B61" } }, y: { beginAtZero: true, ticks: { color: "#AFC1D8" }, grid: { color: "#243B61" } } }
      }
    });
  </script>
</body>
</html>
